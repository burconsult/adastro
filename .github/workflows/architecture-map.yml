name: Architecture Map Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  check-architecture-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate architecture map freshness
        run: node scripts/ci/check-architecture-map.mjs "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

